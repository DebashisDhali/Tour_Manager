<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Test - Tour Manager</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        h1 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 28px;
        }
        
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        .section {
            margin-bottom: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 12px;
        }
        
        .section h2 {
            color: #333;
            font-size: 18px;
            margin-bottom: 15px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
            font-size: 14px;
        }
        
        input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 15px;
            transition: all 0.3s;
        }
        
        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        button {
            width: 100%;
            padding: 14px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        button:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }
        
        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            font-size: 14px;
            display: none;
        }
        
        .result.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .result.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .result.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }
        
        pre {
            background: #2d2d2d;
            color: #f8f8f2;
            padding: 15px;
            border-radius: 8px;
            overflow-x: auto;
            font-size: 12px;
            margin-top: 10px;
        }
        
        .status {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            margin-left: 10px;
        }
        
        .status.online {
            background: #d4edda;
            color: #155724;
        }
        
        .status.offline {
            background: #f8d7da;
            color: #721c24;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧪 Join Test Page</h1>
        <p class="subtitle">Test the "Join with Code" functionality</p>
        
        <!-- Backend Status -->
        <div class="section">
            <h2>Backend Status <span id="status" class="status offline">Checking...</span></h2>
            <button onclick="checkBackend()">🔄 Check Backend</button>
            <div id="backendResult" class="result"></div>
        </div>
        
        <!-- Create Tour -->
        <div class="section">
            <h2>1️⃣ Create Tour (Get Invite Code)</h2>
            <label>Tour Name:</label>
            <input type="text" id="tourName" placeholder="e.g., Cox's Bazar Trip" value="Test Tour">
            
            <label>Your Name:</label>
            <input type="text" id="creatorName" placeholder="e.g., John Doe" value="Test User">
            
            <button onclick="createTour()">✨ Create Tour</button>
            <div id="createResult" class="result"></div>
        </div>
        
        <!-- Join Tour -->
        <div class="section">
            <h2>2️⃣ Join Tour (Use Invite Code)</h2>
            <label>Invite Code:</label>
            <input type="text" id="inviteCode" placeholder="e.g., ABC123" maxlength="6" style="text-transform: uppercase;">
            
            <label>Your Name:</label>
            <input type="text" id="joinerName" placeholder="e.g., Jane Smith" value="Test Joiner">
            
            <button onclick="joinTour()">🚀 Join Tour</button>
            <div id="joinResult" class="result"></div>
        </div>
    </div>

    <script>
        const BASE_URL = 'http://localhost:3000';
        
        // Check backend status
        async function checkBackend() {
            const statusEl = document.getElementById('status');
            const resultEl = document.getElementById('backendResult');
            
            statusEl.textContent = 'Checking...';
            statusEl.className = 'status offline';
            resultEl.style.display = 'none';
            
            try {
                const response = await fetch(`${BASE_URL}/tours`);
                const data = await response.json();
                
                statusEl.textContent = 'Online ✅';
                statusEl.className = 'status online';
                
                resultEl.className = 'result success';
                resultEl.innerHTML = `
                    <strong>✅ Backend is running!</strong><br>
                    Found ${data.length} tours in database.
                    <pre>${JSON.stringify(data, null, 2)}</pre>
                `;
                resultEl.style.display = 'block';
            } catch (error) {
                statusEl.textContent = 'Offline ❌';
                statusEl.className = 'status offline';
                
                resultEl.className = 'result error';
                resultEl.innerHTML = `
                    <strong>❌ Backend is not running!</strong><br>
                    Error: ${error.message}<br><br>
                    <strong>Solution:</strong> Run <code>npm run dev</code> in backend folder
                `;
                resultEl.style.display = 'block';
            }
        }
        
        // Create tour
        async function createTour() {
            const resultEl = document.getElementById('createResult');
            const tourName = document.getElementById('tourName').value.trim();
            const creatorName = document.getElementById('creatorName').value.trim();
            
            if (!tourName || !creatorName) {
                resultEl.className = 'result error';
                resultEl.textContent = '❌ Please fill in all fields';
                resultEl.style.display = 'block';
                return;
            }
            
            resultEl.className = 'result info';
            resultEl.textContent = '⏳ Creating tour...';
            resultEl.style.display = 'block';
            
            try {
                const userId = 'user-' + Math.random().toString(36).substr(2, 9);
                
                const response = await fetch(`${BASE_URL}/tours`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name: tourName,
                        created_by: userId,
                        start_date: new Date().toISOString(),
                        end_date: new Date(Date.now() + 7*24*60*60*1000).toISOString()
                    })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    document.getElementById('inviteCode').value = data.invite_code;
                    
                    resultEl.className = 'result success';
                    resultEl.innerHTML = `
                        <strong>✅ Tour created successfully!</strong><br><br>
                        <strong>Invite Code:</strong> <span style="font-size: 24px; font-weight: bold; color: #667eea;">${data.invite_code}</span><br>
                        <strong>Tour ID:</strong> ${data.id}<br>
                        <strong>Tour Name:</strong> ${data.name}<br><br>
                        👉 Use this code to join the tour below!
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    `;
                } else {
                    throw new Error(data.error || 'Failed to create tour');
                }
            } catch (error) {
                resultEl.className = 'result error';
                resultEl.innerHTML = `
                    <strong>❌ Failed to create tour</strong><br>
                    Error: ${error.message}
                `;
            }
            
            resultEl.style.display = 'block';
        }
        
        // Join tour
        async function joinTour() {
            const resultEl = document.getElementById('joinResult');
            const inviteCode = document.getElementById('inviteCode').value.trim().toUpperCase();
            const joinerName = document.getElementById('joinerName').value.trim();
            
            if (!inviteCode || !joinerName) {
                resultEl.className = 'result error';
                resultEl.textContent = '❌ Please fill in all fields';
                resultEl.style.display = 'block';
                return;
            }
            
            if (inviteCode.length !== 6) {
                resultEl.className = 'result error';
                resultEl.textContent = '❌ Invite code must be 6 characters';
                resultEl.style.display = 'block';
                return;
            }
            
            resultEl.className = 'result info';
            resultEl.textContent = '⏳ Joining tour...';
            resultEl.style.display = 'block';
            
            try {
                const userId = 'user-' + Math.random().toString(36).substr(2, 9);
                
                const response = await fetch(`${BASE_URL}/tours/join`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        invite_code: inviteCode,
                        user_id: userId,
                        user_name: joinerName,
                        email: `${joinerName.toLowerCase().replace(/\s+/g, '')}@test.com`,
                        purpose: 'tour'
                    })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    resultEl.className = 'result success';
                    resultEl.innerHTML = `
                        <strong>✅ ${data.message}</strong><br><br>
                        <strong>Tour Name:</strong> ${data.tour_name}<br>
                        <strong>Tour ID:</strong> ${data.tour_id}<br>
                        <strong>Members:</strong> ${data.tour.Users ? data.tour.Users.length : 0}<br>
                        <strong>Expenses:</strong> ${data.tour.Expenses ? data.tour.Expenses.length : 0}<br><br>
                        <strong>🎉 Join successful! All data loaded.</strong>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    `;
                } else {
                    throw new Error(data.error || 'Failed to join tour');
                }
            } catch (error) {
                resultEl.className = 'result error';
                resultEl.innerHTML = `
                    <strong>❌ Failed to join tour</strong><br>
                    Error: ${error.message}<br><br>
                    <strong>Common issues:</strong><br>
                    • Invalid invite code<br>
                    • Already a member<br>
                    • Backend not running
                `;
            }
            
            resultEl.style.display = 'block';
        }
        
        // Auto-check backend on load
        window.addEventListener('load', checkBackend);
    </script>
</body>
</html>
